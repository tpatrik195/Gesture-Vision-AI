services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gesture
      - POSTGRES_PASSWORD=gesture_password
      - POSTGRES_DB=gesture_db
    volumes:
      - gesture_db_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg2://gesture:gesture_password@db:5432/gesture_db
    depends_on:
      - db

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.prod
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  gesture_db_data:
